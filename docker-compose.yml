version: "3.9"

services:
  prefect-server:
    image: prefecthq/prefect:2.18-python3.11
    container_name: neurodrift-prefect-server
    command: prefect server start --host 0.0.0.0
    environment:
      PREFECT_UI_API_URL: http://localhost:4200/api
      PREFECT_SERVER_API_HOST: 0.0.0.0
    ports:
      - "4200:4200"
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:4200/api/health\")' || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 30s
    volumes:
      - prefect_data:/root/.prefect

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    image: neurodrift-api:local
    container_name: neurodrift-api
    environment:
      NEURODRIFT_LOG_LEVEL: INFO
      NEURODRIFT_REGISTRY_DIR: /app/artifacts/registry
      NEURODRIFT_DATA_DIR: /app/data
      NEURODRIFT_HELD_OUT_SUBJECT: "2"
    ports:
      - "8000:8000"
    volumes:
      - artifacts:/app/artifacts
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    depends_on:
      - prefect-server

  prefect-worker:
    build:
      context: .
      dockerfile: docker/Dockerfile.prefect
    image: neurodrift-prefect:local
    container_name: neurodrift-prefect-worker
    environment:
      PREFECT_API_URL: http://prefect-server:4200/api
      NEURODRIFT_REGISTRY_DIR: /app/artifacts/registry
      NEURODRIFT_DATA_DIR: /app/data
    volumes:
      - artifacts:/app/artifacts
      - moabb_data:/home/neurodrift/mne_data
    depends_on:
      prefect-server:
        condition: service_healthy
    command: ["sleep", "infinity"]

volumes:
  artifacts:
  prefect_data:
  moabb_data:
