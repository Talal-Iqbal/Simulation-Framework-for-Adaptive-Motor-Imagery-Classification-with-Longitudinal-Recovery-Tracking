name: train

on:
  workflow_dispatch:
    inputs:
      global_subjects:
        description: "Comma-separated global training subject ids"
        required: false
        default: "1,3,4,5,6,7,8,9"
      held_out_subject:
        description: "Held-out subject id for Stage 2 calibration"
        required: false
        default: "2"
  schedule:
    - cron: "0 4 * * 0"

jobs:
  train-and-publish:
    name: Train on full MOABB data + publish artifacts
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip wheel
          pip install -r requirements-dev.txt
          pip install -e .

      - name: Cache MOABB downloads
        uses: actions/cache@v4
        with:
          path: ~/mne_data
          key: moabb-bnci2014-001-v1

      - name: Run NeuroDrift training flow
        env:
          NEURODRIFT_LOG_LEVEL: INFO
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          NOTIFY_FROM: ${{ secrets.NOTIFY_FROM }}
          NOTIFY_TO: ${{ secrets.NOTIFY_TO }}
        run: |
          python scripts/train_all.py \
            --global-subjects "${{ inputs.global_subjects || '1,3,4,5,6,7,8,9' }}" \
            --held-out-subject "${{ inputs.held_out_subject || '2' }}"

      - name: Upload registry artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: neurodrift-registry-${{ github.sha }}
          path: artifacts/registry
          retention-days: 30

      - name: Log in to GitHub Container Registry
        if: success()
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        if: success()
        uses: docker/setup-buildx-action@v3

      - name: Build & push API image to GHCR
        if: success()
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.api
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/neurodrift-api:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/neurodrift-api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
