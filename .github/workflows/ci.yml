name: ci

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint-and-test:
    name: Lint, type-check, unit tests (synthetic data only)
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip wheel
          pip install -r requirements-dev.txt
          pip install -e .

      - name: Ruff lint
        run: ruff check src/ tests/ scripts/

      - name: Mypy (non-strict)
        run: mypy src/neurodrift --ignore-missing-imports || true

      - name: Pytest with synthetic fixtures
        env:
          NEURODRIFT_LOG_LEVEL: WARNING
        run: pytest tests/ -m "not slow" --maxfail=3 -q

      - name: Seed synthetic registry (smoke check)
        run: python scripts/seed_artifacts.py

  docker-build:
    name: Build API Docker image
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: lint-and-test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image (no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.api
          push: false
          tags: neurodrift-api:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
